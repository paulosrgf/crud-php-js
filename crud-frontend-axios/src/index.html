<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD JS Project</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header class="bg-dark text-white py-4 mb-4">
        <h1 class="text-center m-0">Product Store</h1>
    </header>
    <main class="container pb-5">
        <section class="card p-4 mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <h2 class="m-0">Products</h2>
                <form id="search-form" class="d-flex gap-2" role="search">
                    <input type="text" id="search-input" class="form-control" placeholder="Search by name...">
                    <button type="submit" class="btn btn-outline-dark">Search</button>
                    <button type="button" id="clear-search" class="btn btn-outline-secondary">Clear</button>
                </form>
            </div>
            <div class="row g-3" id="products"></div>
        </section>

        <section class="card p-4">
            <h2 class="mb-3" id="form-title">Add Product</h2>
            <div id="form-error" class="alert alert-danger d-none" role="alert"></div>
            <form id="create-product-form" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label for="product-name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="product-name" name="name" required>
                </div>
                <div class="col-md-3">
                    <label for="product-price" class="form-label">Price</label>
                    <input type="number" step="0.01" min="0" class="form-control" id="product-price" name="price" required>
                </div>
                <div class="col-md-2">
                    <label for="product-stock" class="form-label">Stock</label>
                    <input type="number" min="0" class="form-control" id="product-stock" name="stock" required>
                </div>
                <div class="col-md-2">
                    <label for="product-category" class="form-label">Category</label>
                    <input type="text" class="form-control" id="product-category" name="category" required>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-dark flex-fill">Add</button>
                    <button type="button" id="cancel-edit" class="btn btn-outline-secondary" style="display:none;">Cancel</button>
                </div>
            </form>
        </section>
    </main>

    <!-- Modal de confirmação de exclusão (substitui o confirm() nativo) -->
    <div class="modal fade" id="delete-modal" tabindex="-1" aria-labelledby="delete-modal-label" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="delete-modal-label">Confirm deletion</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to delete <strong id="delete-modal-product-name"></strong>?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirm-delete-btn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
